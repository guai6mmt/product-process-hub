<style>
#erd svg.erDiagram .divider path { stroke-opacity: 0.5; }
#erd svg.erDiagram .row-rect-odd path,
#erd svg.erDiagram .row-rect-even path { stroke: none !important; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const { svg } = await mermaid.render('erd-svg', `erDiagram
  PRODUCT ||--o{ PROCESS_INSTANCE : runs
  PROCESS_INSTANCE ||--o{ STAGE_INSTANCE : has
  STAGE_INSTANCE ||--o{ DOC_REQUIREMENT : needs
  DOC_REQUIREMENT ||--o{ DOCUMENT_VERSION : has
  DOCUMENT_VERSION ||--|| UPLOADED_FILE : stores
  STAGE_INSTANCE ||--o{ UPLOADED_FILE : receives
  DOC_TEMPLATE ||--o{ GENERATED_FILE : produces
  UPLOADED_FILE ||--o{ GENERATED_FILE : feeds
  DOC_REQUIREMENT ||--o| DOC_TEMPLATE : binds
  GENERATED_FILE ||--o| DOCUMENT_VERSION : becomes
  PRODUCT {
    uuid id PK
    string name
    string status
  }
  PROCESS_INSTANCE {
    uuid id PK
    uuid product_id FK
    string state
  }
  STAGE_INSTANCE {
    uuid id PK
    uuid process_id FK
    string name
    string state
  }
  DOC_REQUIREMENT {
    uuid id PK
    uuid stage_inst_id FK
    string doc_name
    bool is_ready
    uuid template_id FK
  }
  DOCUMENT_VERSION {
    uuid id PK
    uuid requirement_id FK
    string version_label
    string sub_state
    uuid uploaded_file_id FK
  }
  UPLOADED_FILE {
    uuid id PK
    uuid stage_inst_id FK
    string original_name
    string file_path
    string mime_type
    datetime uploaded_at
  }
  DOC_TEMPLATE {
    uuid id PK
    string template_name
    string file_path
    json field_schema
  }
  GENERATED_FILE {
    uuid id PK
    uuid template_id FK
    uuid source_file_id FK
    string output_path
    json filled_values
    datetime generated_at
  }`);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
