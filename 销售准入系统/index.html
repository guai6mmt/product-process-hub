<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>产品流程与文件管理系统</title>
<style>
:root{--bg:#f5f6f8;--card:#fff;--line:#e4e7ec;--txt:#1f2733;--muted:#6b7480;--blue:#2f5fcf;--blue-dk:#244aa0;
--green:#1d9e57;--amber:#c47d12;--red:#cc3b3b;--green-bg:#e8f6ee;--amber-bg:#fbf1de;--red-bg:#fbe9e9;--blue-bg:#eaf0fc;--gray-bg:#eef0f3;}
*{box-sizing:border-box}
body{margin:0;font-family:"Microsoft YaHei","Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--txt);font-size:14px}
header{background:var(--card);border-bottom:1px solid var(--line);padding:0 20px;display:flex;align-items:center;gap:16px;height:54px;position:sticky;top:0;z-index:20}
.logo{font-weight:700;font-size:16px;color:var(--blue-dk)}
nav{display:flex;gap:4px;flex:1}
nav button{background:none;border:none;padding:8px 14px;border-radius:7px;cursor:pointer;color:var(--muted);font-size:14px}
nav button.active{background:var(--blue-bg);color:var(--blue-dk);font-weight:600}
nav button:hover{background:var(--gray-bg)}
.btn{background:var(--blue);color:#fff;border:none;padding:8px 16px;border-radius:7px;cursor:pointer;font-size:14px}
.btn:hover{background:var(--blue-dk)}
.btn.ghost{background:var(--card);color:var(--txt);border:1px solid var(--line)}
.btn.sm{padding:4px 9px;font-size:12px}
.btn.danger{background:none;color:var(--red);border:1px solid var(--red)}
main{max-width:1100px;margin:20px auto;padding:0 20px}
.view{display:none}.view.active{display:block}
h2{font-size:18px;margin:0 0 4px}.sub{color:var(--muted);margin-bottom:16px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:16px}
.card.click{cursor:pointer}.card.click:hover{box-shadow:0 2px 10px rgba(0,0,0,.06);border-color:#c9d2e0}
.card h3{margin:0 0 6px;font-size:16px}.meta{color:var(--muted);font-size:13px;margin-bottom:10px}
.bar{height:8px;background:var(--gray-bg);border-radius:5px;overflow:hidden;margin:8px 0}
.bar>i{display:block;height:100%;background:var(--blue)}.bar>i.full{background:var(--green)}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:12px;font-weight:600}
.b-green{background:var(--green-bg);color:var(--green)}.b-amber{background:var(--amber-bg);color:var(--amber)}
.b-red{background:var(--red-bg);color:var(--red)}.b-gray{background:var(--gray-bg);color:var(--muted)}.b-blue{background:var(--blue-bg);color:var(--blue-dk)}
table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden}
th,td{padding:9px 11px;text-align:left;border-bottom:1px solid var(--line);font-size:13px;vertical-align:middle}
th{background:#fafbfc;color:var(--muted);font-weight:600}tr:last-child td{border-bottom:none}
select,input[type=text],input[type=number]{padding:5px 7px;border:1px solid var(--line);border-radius:6px;font-size:13px;background:#fff}
select.s-通过,select.s-已用印{border-color:var(--green);color:var(--green)}
select.s-退回{border-color:var(--red);color:var(--red)}select.s-送审中{border-color:var(--amber);color:var(--amber)}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin:14px 0 6px;border-bottom:2px solid var(--line)}
.tabs button{background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-2px;padding:8px 14px;cursor:pointer;color:var(--muted);font-size:14px}
.tabs button.active{color:var(--blue-dk);border-bottom-color:var(--blue);font-weight:600}
.banner{background:var(--amber-bg);color:var(--amber);padding:8px 12px;border-radius:8px;font-size:13px;margin:10px 0}
.catlabel{font-weight:700;color:var(--blue-dk);margin:14px 0 6px;font-size:13px}
.reqcard{background:var(--card);border:1px solid var(--line);border-radius:9px;margin-bottom:8px;overflow:hidden}
.reqcard.done{border-color:#bfe3cd}
.reqcard>summary{list-style:none;cursor:pointer;padding:11px 14px;display:flex;align-items:center;gap:10px}
.reqcard>summary::-webkit-details-marker{display:none}
.reqcard>summary::before{content:"▸";color:var(--muted);font-size:12px}
.reqcard[open]>summary::before{content:"▾"}
.rqname{font-weight:600;white-space:nowrap}
.steps{flex:1;display:flex;gap:6px;flex-wrap:wrap;align-items:center;min-width:0}
.step{font-size:12px;padding:1px 8px;border-radius:20px;white-space:nowrap;display:inline-flex;align-items:center}
.step .d{width:6px;height:6px;border-radius:50%;background:currentColor;display:inline-block;margin-right:5px}
.step.ok{background:var(--green-bg);color:var(--green)}
.step.act{background:var(--blue-bg);color:var(--blue-dk)}
.step.wip{background:var(--amber-bg);color:var(--amber)}
.step.bad{background:var(--red-bg);color:var(--red)}
.step.pend{background:var(--gray-bg);color:var(--muted)}
.badge.cta{cursor:pointer}
.badge.cta:hover{background:var(--blue);color:#fff}
.fblock.flash{animation:flash 1.4s ease}
@keyframes flash{0%,100%{background:transparent}30%{background:var(--amber-bg)}}
.rejnote{flex-basis:100%;color:var(--red);background:var(--red-bg);border-radius:6px;padding:5px 9px;font-size:12px;margin-top:6px}
.rqbody{padding:4px 14px 14px 32px;border-top:1px solid var(--line);background:#fcfcfd}
.fblock{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px dashed var(--line);flex-wrap:wrap}
.fblock:last-child{border-bottom:none}
.fblabel{width:130px;font-size:13px;color:var(--muted);display:flex;align-items:center;gap:7px}
.fblabel b{color:var(--txt)}
.files{flex:1;display:flex;flex-wrap:wrap;gap:6px;min-width:160px}
.fchip{background:var(--gray-bg);border-radius:6px;padding:2px 8px;font-size:12px}
.fchip b{color:var(--blue-dk)}
.xdel{color:var(--red);cursor:pointer;font-weight:700;margin-left:3px}
.rqfoot{padding-top:10px;display:flex;gap:8px}
.link{color:var(--blue);cursor:pointer;text-decoration:none}.na{color:#b9c0c9;font-size:12px}.muted{color:var(--muted)}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(20,28,40,.45);z-index:50;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:12px;padding:22px;width:460px;max-width:93vw;max-height:90vh;overflow:auto}
.modal h3{margin:0 0 16px}
.field{margin-bottom:13px}.field label{display:block;font-size:13px;color:var(--muted);margin-bottom:5px}
.field input[type=text],.field input[type=number],.field select{width:100%}
.row{display:flex;gap:10px}.row>*{flex:1}
.checks{display:flex;gap:16px;flex-wrap:wrap}.checks label{font-size:13px;color:var(--txt)}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:10px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#222b39;color:#fff;padding:10px 18px;border-radius:8px;z-index:99;opacity:0;transition:.2s}
.toast.show{opacity:1}.toast.err{background:var(--red)}
.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
.empty{text-align:center;color:var(--muted);padding:50px 0}
.tplmx{display:grid;gap:7px;margin:8px 0 4px}
.tplmx .mh{font-size:12px;color:var(--muted);padding:2px 8px;align-self:end}
.tplmx .rl{display:flex;align-items:center;gap:6px;font-weight:600;font-size:13px;padding:8px 4px}
.mcell{border:1px solid var(--line);border-radius:8px;padding:9px 11px;font-size:13px;background:var(--card);cursor:pointer;display:flex;align-items:center;gap:6px;min-height:42px}
.mcell:hover{border-color:#c9d2e0;box-shadow:0 1px 6px rgba(0,0,0,.05)}
.mcell.base{background:#fafbfc}
.mcell.sel{border:2px solid var(--blue);background:var(--blue-bg)}
.mcell .n{font-weight:700;font-size:15px;color:var(--blue-dk)}
.mcell.inh{color:var(--muted);font-size:12px}
.mcell.empty{color:#b9c0c9}
.mcell.empty:hover,.mcell.inh:hover{box-shadow:none}
.bpgrp{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--muted);font-weight:700;margin:16px 0 8px}
.bpgrp .ln{flex:1;height:1px;background:var(--line)}
.bpitem{display:flex;align-items:center;gap:10px;padding:9px 12px;border:1px solid var(--line);border-radius:9px;margin-bottom:7px;background:var(--card)}
.bpitem.inh{opacity:.78;background:#fafbfc;border-style:dashed}
.bpitem .nm{font-weight:600;font-size:13px;width:200px;flex-shrink:0}
.bpitem .pills{display:flex;gap:6px;flex-wrap:wrap;flex:1}
.bpitem .act{display:flex;gap:10px;flex-shrink:0;white-space:nowrap}
.pill{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:2px 9px;border-radius:20px;background:var(--gray-bg);color:var(--muted);border:1px solid var(--line)}
.pill .dot{width:6px;height:6px;border-radius:50%}
.pill.cond{background:var(--amber-bg);color:var(--amber);border-color:transparent}
</style>
</head>
<body>
<header>
  <span class="logo">产品流程 · 文件管理</span>
  <nav>
    <button data-v="dashboard" class="active" onclick="nav('dashboard')">驾驶舱</button>
    <button data-v="todo" onclick="nav('todo')">今日待办</button>
    <button data-v="tpl" onclick="nav('tpl')">模板管理</button>
    <button data-v="lib" onclick="nav('lib')">文件库</button>
  </nav>
  <button class="btn ghost" onclick="exportAll()">导出全部</button>
  <button class="btn" onclick="openCreate()">＋ 一键开产品</button>
</header>
<main>
  <section id="dashboard" class="view active">
    <h2>产品驾驶舱</h2><div class="sub">点产品卡片查看其全部流程的清单与文件。</div>
    <div id="cards" class="cards"></div>
  </section>

  <section id="detail" class="view">
    <button class="btn ghost sm" onclick="nav('dashboard')">← 返回</button>
    <div id="detailBody" style="margin-top:12px"></div>
  </section>

  <section id="todo" class="view">
    <h2>今日待办</h2><div class="sub">所有产品里"还没到位"的文件，按流程汇总。</div>
    <div id="todoBody"></div>
  </section>

  <section id="tpl" class="view">
    <h2>模板管理</h2>
    <div class="sub">行＝产品类型，列＝流程。点格子查看/编辑该清单；留空的格子自动继承“通用”。开产品时据此生成。</div>
    <div id="tplMatrix"></div>
    <div id="bpBody" style="margin-top:18px"></div>
  </section>

  <section id="lib" class="view">
    <h2>共用文件库</h2>
    <div class="sub">放“多个产品都一样”的文件：单个文件可在各产品对应类别用“📚库”选用；文件包(一套)可在文件项里“📦整套导入”（含消保/法审/用印，并自动置为已通过/已用印）。</div>
    <div id="libBody"></div>
  </section>

</main>

<div class="modal-bg" id="mCreate"><div class="modal">
  <h3>一键开产品</h3>
  <div class="field"><label>产品名称 *</label><input type="text" id="cName" placeholder="如：XX私募证券投资基金一期"></div>
  <div class="field"><label>产品类型</label><select id="cType"></select></div>
  <div class="row">
    <div class="field"><label>补充协议份数</label><input type="number" id="cSupp" min="1" value="1"></div>
    <div class="field"><label>合同形态</label><select id="cForm"><option value="合并">合并（1份）</option><option value="拆分">拆分（3份）</option></select></div>
  </div>
  <div class="field"><label><input type="checkbox" id="cPoster"> 含海报（默认随机构）</label></div>
  <div class="modal-actions"><button class="btn ghost" onclick="close_('mCreate')">取消</button><button class="btn" onclick="submitCreate()">生成清单</button></div>
</div></div>

<div class="modal-bg" id="mBp"><div class="modal">
  <h3 id="bpTitle">文件项</h3>
  <input type="hidden" id="bpId">
  <div class="row">
    <div class="field"><label>大类</label><input type="text" id="bpCat" placeholder="如：代销协议"></div>
    <div class="field"><label>文件项名称 *</label><input type="text" id="bpName" placeholder="如：总对总协议"></div>
  </div>
  <div class="field"><label>文件要求</label>
    <div class="checks">
      <label><input type="checkbox" id="bpFile" checked> 需要上传主文件（不勾＝此项无需上传文件即可“到位”）</label>
    </div>
  </div>
  <div class="field"><label>需要哪些审查</label>
    <div class="checks">
      <label><input type="checkbox" id="bpXb"> 消保</label>
      <label><input type="checkbox" id="bpFs"> 法审</label>
      <label><input type="checkbox" id="bpYy"> 用印</label>
    </div>
  </div>
  <div class="row">
    <div class="field"><label>用印方（用印时填）</label><input type="text" id="bpSeal" placeholder="双方 / 对方机构"></div>
    <div class="field"><label>纳入条件</label><select id="bpCond">
      <option value="always">总是</option><option value="poster">机构有海报时</option>
      <option value="merge">合同=合并时</option><option value="split">合同=拆分时</option></select></div>
  </div>
  <div class="row">
    <div class="field"><label><input type="checkbox" id="bpRep"> 可复制多份（如补充协议）</label></div>
    <div class="field"><label>排序</label><input type="number" id="bpSort" value="0"></div>
  </div>
  <div class="modal-actions"><button class="btn ghost" onclick="close_('mBp')">取消</button><button class="btn" onclick="saveBp()">保存</button></div>
</div></div>

<div class="modal-bg" id="mReq"><div class="modal">
  <h3>增加一项文件（仅本产品）</h3>
  <input type="hidden" id="rqProc">
  <div class="row">
    <div class="field"><label>大类</label><input type="text" id="rqCat" placeholder="如：其他"></div>
    <div class="field"><label>文件项名称 *</label><input type="text" id="rqName"></div>
  </div>
  <div class="field"><label><input type="checkbox" id="rqFile" checked> 需要上传文件</label></div>
  <div class="field"><label>需要哪些审查</label><div class="checks">
    <label><input type="checkbox" id="rqXb"> 消保</label>
    <label><input type="checkbox" id="rqFs"> 法审</label>
    <label><input type="checkbox" id="rqYy"> 用印</label></div></div>
  <div class="field"><label>用印方</label><input type="text" id="rqSeal" placeholder="双方 / 对方机构"></div>
  <div class="modal-actions"><button class="btn ghost" onclick="close_('mReq')">取消</button><button class="btn" onclick="submitReq()">添加</button></div>
</div></div>

<div class="modal-bg" id="mImport"><div class="modal">
  <h3>从其他产品导入本流程文件</h3>
  <input type="hidden" id="impProc">
  <div class="field"><label>来源产品（复制其“相同流程、同名文件项”的已上传文件与审查状态到当前产品）</label>
    <select id="impSrc"></select></div>
  <div class="banner">一次性复制：导入后两个产品各自独立、互不影响；仅按“文件项名称”匹配复制。</div>
  <div class="modal-actions"><button class="btn ghost" onclick="close_('mImport')">取消</button><button class="btn" onclick="submitImport()">导入</button></div>
</div></div>

<div class="modal-bg" id="mLib"><div class="modal">
  <h3 id="libPickTitle">从文件库选择</h3>
  <div id="libPickBody" style="max-height:50vh;overflow:auto"></div>
  <div class="modal-actions"><button class="btn ghost" onclick="close_('mLib')">关闭</button></div>
</div></div>

<div class="toast" id="toast"></div>
<script>
let CFG={processes:[],product_types:[]},MX={};
const api=(u,m,b)=>fetch(u,{method:m||'GET',headers:{'Content-Type':'application/json'},body:b?JSON.stringify(b):undefined}).then(r=>r.json());
const esc=s=>(s==null?'':''+s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function toast(m,e){const t=document.getElementById('toast');t.textContent=m;t.className='toast show'+(e?' err':'');setTimeout(()=>t.className='toast',2200);}
function close_(id){document.getElementById(id).classList.remove('show');}
function show_(id){document.getElementById(id).classList.add('show');}
async function loadCfg(){CFG=await api('/api/config');}

function nav(v){document.querySelectorAll('.view').forEach(s=>s.classList.remove('active'));document.getElementById(v).classList.add('active');
 document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('active',b.dataset.v===v));
 if(v==='dashboard')loadDash();if(v==='todo')loadTodo();if(v==='tpl')loadTpl();if(v==='lib')loadLibrary();}
function navDetail(){document.querySelectorAll('.view').forEach(s=>s.classList.remove('active'));document.getElementById('detail').classList.add('active');document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));}

async function loadDash(){
  const ps=await api('/api/products');const el=document.getElementById('cards');
  if(!ps.length){el.innerHTML='<div class="empty">还没有产品。点右上角"＋ 一键开产品"开始。</div>';return;}
  el.innerHTML=ps.map(p=>`<div class="card click" onclick="openDetail(${p.id})">
    <h3>${esc(p.name)}</h3><div class="meta">${esc(p.ptype||'—')}</div>
    <div class="bar"><i class="${p.ready?'full':''}" style="width:${p.progress}%"></i></div>
    <div style="display:flex;justify-content:space-between;align-items:center">
      <span class="muted">${p.done}/${p.total} 项到位 · ${p.progress}%</span>
      <span class="badge ${p.ready?'b-green':'b-amber'}">${p.ready?'全部备齐':'进行中'}</span></div></div>`).join('');
}

async function openDetail(id,keepTab){
  const d=await api('/api/product?id='+id);window._d=d;window._pid=id;
  if(keepTab===undefined)window._tab=0;
  navDetail();renderDetail();
}
function renderDetail(){
  const d=window._d;const tabs=d.processes;
  let head=`<div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px">
    <div><h2 style="display:inline">${esc(d.name)}</h2> <span class="badge ${d.ready?'b-green':'b-amber'}">${d.ready?'全部备齐':'进行中'}</span>
    <div class="sub">${esc(d.ptype||'—')} · 合同:${esc(d.contract_form)} · 总进度 ${d.done}/${d.total}（${d.progress}%）</div></div>
    <div style="display:flex;gap:8px"><button class="btn ghost sm" onclick="exportOne(${d.id},0)">导出文件包</button>
    <button class="btn ghost sm" onclick="exportOne(${d.id},1)">导出(含历史)</button>
    <button class="btn danger sm" onclick="delProduct(${d.id})">删除产品</button></div></div>`;
  if(!tabs.length){document.getElementById('detailBody').innerHTML=head+'<div class="empty">该产品没有清单项。</div>';return;}
  if(window._tab>=tabs.length)window._tab=0;
  let tabbar=`<div class="tabs">`+tabs.map((t,i)=>`<button class="${i===window._tab?'active':''}" onclick="window._tab=${i};renderDetail()">${esc(t.name)} <span class="badge ${t.ready?'b-green':'b-gray'}" style="margin-left:4px">${t.done}/${t.total}</span></button>`).join('')+`</div>`;
  const t=tabs[window._tab];
  const onlyTodo=!!window._onlyTodo;
  const reqs=t.requirements.filter(r=>!onlyTodo||!r.done);
  let body='';
  if(!t.prior_ready)body+=`<div class="banner">⚠ 前序流程尚未备齐（软提示，不影响你继续操作本流程）</div>`;
  body+=`<div class="toolbar"><span class="muted">${t.name}：${t.done}/${t.total} 到位</span>
    <label class="muted" style="display:flex;align-items:center;gap:5px;cursor:pointer"><input type="checkbox" ${onlyTodo?'checked':''} onchange="window._onlyTodo=this.checked;renderDetail()"> 只看未到位</label>
    <button class="btn ghost sm" onclick="expandAll(true)">展开全部</button>
    <button class="btn ghost sm" onclick="expandAll(false)">收起全部</button>
    <span style="flex:1"></span>
    <button class="btn ghost sm" onclick="importFromProduct(${t.id})" title="把其他产品本流程已上传的文件复制过来">📥 从其他产品导入</button>
    <button class="btn ghost sm" onclick="openReq(${t.id})">＋ 增加一项</button></div>`;
  if(!reqs.length){body+=`<div class="empty">${onlyTodo?'本流程已全部到位 🎉':'该流程没有清单项。'}</div>`;}
  else{let cat='';body+=reqs.map(r=>{let h='';if(r.category!==cat){cat=r.category;h=`<div class="catlabel">${esc(cat)}</div>`;}return h+reqCard(r);}).join('');}
  document.getElementById('detailBody').innerHTML=head+tabbar+body;
}
function expandAll(o){document.querySelectorAll('#detailBody .reqcard').forEach(d=>d.open=o);}
function summarySteps(r){
  const mf=(r.files&&r.files['主文件'])||[];
  const steps=[];
  if(r.needs_file!==0)steps.push({name:'主文件',done:mf.length>0,up:true});
  if(r.needs_xb)steps.push({name:'消保',done:r.xb_status==='通过',rej:r.xb_status==='退回',wip:r.xb_status==='送审中',note:r.xb_note});
  if(r.needs_fs)steps.push({name:'法审',done:r.fs_status==='通过',rej:r.fs_status==='退回',wip:r.fs_status==='送审中',note:r.fs_note});
  if(r.needs_yy)steps.push({name:'用印'+(r.seal_party?'·'+r.seal_party:''),done:r.yy_status==='已用印'});
  if(!steps.length)return `<span class="step ok">✓ 无需材料</span>`;
  const cur=steps.findIndex(s=>!s.done);
  return steps.map((s,i)=>{
    if(s.done)return `<span class="step ok">✓ ${esc(s.name)}</span>`;
    let cls='pend',extra='';
    if(i===cur){if(s.rej){cls='bad';extra=' 退回';}else if(s.wip){cls='wip';extra=' 送审中';}else cls='act';}
    if(s.up)extra=' 未上传';
    const tip=(cls==='bad'&&s.note)?` title="退回意见：${esc(s.note)}"`:'';
    return `<span class="step ${cls}"${tip}><i class="d"></i>${esc(s.name)}${extra}</span>`;
  }).join('');
}
function findReq(rid){const d=window._d;if(!d)return null;for(const p of d.processes){const r=(p.requirements||[]).find(x=>x.id===rid);if(r)return r;}return null;}
function cta(rid){const r=findReq(rid);if(!r)return;
  const mf=(r.files&&r.files['主文件'])||[];
  if(r.needs_file!==0&&!mf.length){pickFile(rid,'主文件');return;}
  let cat=null;
  if(r.needs_xb&&r.xb_status!=='通过')cat='消保';
  else if(r.needs_fs&&r.fs_status!=='通过')cat='法审';
  else if(r.needs_yy&&r.yy_status!=='已用印')cat='用印';
  const card=document.getElementById('rq'+rid);if(card)card.open=true;
  if(cat&&card){const blk=card.querySelector('[data-blk="'+cat+'"]');if(blk){blk.scrollIntoView({behavior:'smooth',block:'center'});blk.classList.add('flash');setTimeout(()=>blk.classList.remove('flash'),1400);}}
}
function reqCard(r){
  let blocks=fblock(r,'主文件','主文件',null,null);
  if(r.needs_xb)blocks+=fblock(r,'消保','消保','xb',r.xb_status);
  if(r.needs_fs)blocks+=fblock(r,'法审','法审','fs',r.fs_status);
  if(r.needs_yy)blocks+=fblock(r,'用印'+(r.seal_party?'·'+r.seal_party:''),'用印','yy',r.yy_status);
  blocks+=fblock(r,'其他附件','其他',null,null);

    :`<span class="badge b-blue cta" title="点击直接处理这一步" onclick="event.preventDefault();event.stopPropagation();cta(${r.id})">${esc(r.next_action)} ›</span>`;
  return `<details id="rq${r.id}" class="reqcard ${r.done?'done':''}"><summary>

    <button class="btn danger sm" onclick="delReq(${r.id})">删除此项</button></div></div></details>`;
}
function fblock(r,label,cat,field,val){
  let opts=field?(field==='yy'?['待用印','已用印']:['未启动','送审中','通过','退回']):null;
  let sel=opts?`<select class="s-${val}" onchange="setRev(${r.id},'${field}',this.value)">${opts.map(o=>`<option ${o===val?'selected':''}>${o}</option>`).join('')}</select>`:'';
  let fs=(r.files[cat]||[]);
  let flist=fs.map(f=>`<span class="fchip">${esc(f.filename)}${cat==='主文件'?` <b>V${f.version_no}</b>`:''} <a class="link" href="/api/file?fid=${f.id}">下载</a><span class="xdel" onclick="delFile(${f.id})">×</span></span>`).join('');
  let note=(field&&val==='退回'&&r[field+'_note'])?`<div class="rejnote">⚠ 退回意见：${esc(r[field+'_note'])}</div>`:'';
  return `<div class="fblock" data-blk="${esc(cat)}"><div class="fblabel">${esc(label)}${sel}</div>
    <div class="files">${flist||'<span class="na">无文件</span>'}</div>
    <button class="btn ghost sm" onclick="pickFile(${r.id},'${cat}')">＋上传</button>
    <button class="btn ghost sm" onclick="pickLibFile(${r.id},'${cat}')">📚库</button>${note}</div>`;
}

    <span class="badge ${items.length?'b-blue':'b-gray'}">${items.length} 项</span><span style="flex:1"></span>`;
  if(inherited&&items.length){
    head+=`<button class="btn" onclick="forkBp()">复制【通用】清单到此，开始微调</button>`;
  }else{

function pill(label,color){return `<span class="pill"><span class="dot" style="background:${color}"></span>${label}</span>`;}
function bpItem(i,inherited){let p='';
  if(i.needs_xb)p+=pill('消保','#2f5fcf');

  if(i.needs_yy)p+=pill('用印'+(i.seal_party?' · '+esc(i.seal_party):''),'#c47d12');
  if(i.cond&&i.cond!=='always')p+=`<span class="pill cond">${condText(i.cond)}</span>`;
  if(i.repeatable)p+=`<span class="pill">可多份</span>`;
  if(!i.required)p+=`<span class="pill">可选</span>`;
  if(i.needs_file===0)p+=`<span class="pill">无需上传</span>`;
  if(!p)p='<span class="na">无审查要求</span>';
  const act=inherited?`<span class="na">继承自通用</span>`
    :`<span class="link" onclick='editBp(${JSON.stringify(i)})'>编辑</span> · <span class="link" onclick="delBp(${i.id})">删除</span>`;
  return `<div class="bpitem ${inherited?'inh':''}"><span class="nm">${esc(i.name)}</span><span class="pills">${p}</span><span class="act">${act}</span></div>`;}

  await api('/api/blueprint_clear','POST',{ptype:window._tplType,process_id:window._tplProc});await loadTpl();toast('已恢复为继承通用');}
async function delBp(id){if(!confirm('删除此模板项？'))return;await api('/api/blueprint_delete','POST',{id});loadTpl();}
async function addType(){const n=prompt('新产品类型名称：');if(!n)return;await api('/api/ptype_add','POST',{name:n.trim()});window._tplType=n.trim();await loadTpl();}
async function addProc(){const n=prompt('新流程名称：');if(!n)return;await api('/api/process_add','POST',{name:n.trim()});await loadTpl();}
async function delType(name){if(name==='通用'){toast('“通用”是基线，不能删除',true);return;}
  if(!confirm('删除产品类型【'+name+'】？\n它的专属模板会一并删除；已创建的产品不受影响。'))return;
  await api('/api/ptype_delete','POST',{name});if(window._tplType===name)window._tplType='通用';await loadTpl();toast('已删除产品类型');}
async function delProc(id){const name=(CFG.processes.find(p=>p.id===id)||{}).name||'';
  if(!confirm('删除流程【'+name+'】？\n将同时删除：该流程的全部模板项，以及所有产品中该流程的文件项及已上传文件。\n此操作不可恢复！'))return;
  await api('/api/process_delete','POST',{id});if(window._tplProc===id)window._tplProc=(CFG.processes.find(p=>p.id!==id)||{}).id;await loadTpl();toast('已删除流程');}

async function openCreate(){await loadCfg();
  document.getElementById('cType').innerHTML=CFG.product_types.map(t=>`<option>${esc(t.name)}</option>`).join('');
  document.getElementById('cPoster').checked=false;
  document.getElementById('cName').value='';show_('mCreate');}
async function submitCreate(){const name=document.getElementById('cName').value.trim();if(!name){toast('填产品名',true);return;}
  const res=await api('/api/products','POST',{name,ptype:document.getElementById('cType').value,
   contract_form:document.getElementById('cForm').value,n_supp:+document.getElementById('cSupp').value||1,has_poster:document.getElementById('cPoster').checked});
  close_('mCreate');toast('已生成清单');openDetail(res.id);}

loadCfg().then(loadDash);
</script>
</body>
